<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Messaging Service</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="new-badge">SERVERLESS</div>
        <h1 class="form-title">Cloud Messaging Service</h1>

        <div class="feature-item">
            <div class="check-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12L10 17L19 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="feature-text">Powered by AWS Lambda · Step Functions · SES · SNS</div>
        </div>

        <form id="messaging-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="message">Message</label>
                    <input
                        type="text"
                        id="message"
                        name="message"
                        placeholder="Type your message here..."
                        required
                        maxlength="1600"
                    >
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="recipient@example.com"
                    >
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button type="button" onclick="sendMessage(event, 'email')">
                        Send Email
                    </button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="sms">Phone number</label>
                    <input
                        type="tel"
                        id="sms"
                        name="sms"
                        placeholder="+1234567890"
                    >
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button type="button" onclick="sendMessage(event, 'sms')">
                        Send SMS
                    </button>
                </div>
            </div>

            <!-- Status feedback -->
            <div id="status-message" class="status" role="alert" aria-live="polite"></div>
        </form>
    </div>
</body>
</html>

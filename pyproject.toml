[tool.pytest.ini_options]
testpaths  = ["tests"]
pythonpath = ["."]
addopts    = "-v --cov=functions --cov-report=term-missing"

[tool.coverage.run]
source = ["functions"]
omit   = ["tests/*", "**/__init__.py"]

[tool.black]
line-length    = 100
target-version = ["py312"]

[tool.ruff]
line-length    = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
